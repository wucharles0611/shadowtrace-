name: ci

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: backend-lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (dev extras)
        run: python -m pip install -e ".[dev]"

      - name: Ruff check
        run: python -m ruff check app tests

      - name: Ruff format check
        run: python -m ruff format --check app tests

      - name: Mypy
        run: python -m mypy app

  backend-test:
    name: backend-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: shadowtrace
          POSTGRES_PASSWORD: shadowtrace
          POSTGRES_DB: shadowtrace
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shadowtrace -d shadowtrace"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://shadowtrace:shadowtrace@localhost:5432/shadowtrace
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (dev extras)
        run: python -m pip install -e ".[dev]"

      - name: Pytest with coverage
        run: >
          python -m pytest --cov=app --cov-report=term
          --cov-report=xml:coverage.xml

      - name: Repeat critical timing tests under coverage
        run: |
          for attempt in 1 2 3; do
            echo "Timing test pass ${attempt}/3"
            python -m pytest \
              tests/test_tools/test_verify_tools.py::test_verification_waits_for_job_and_delayed_projection \
              tests/test_tools/test_verify_tools.py::test_pending_projection_timeout_is_not_reported_as_effect_failure \
              tests/test_tools/test_verify_tools.py::test_delayed_projection_becomes_visible_after_clock_advance \
              --cov=app --cov-append --cov-report=term \
              --cov-report=xml:coverage.xml
          done

      - name: Upload coverage summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: warn

  frontend-build:
    name: frontend-build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      COMPOSE_PROJECT_NAME: shadowtrace-ci-${{ github.run_id }}-${{ github.run_attempt }}
      POSTGRES_PORT: "5432"
      REDIS_PORT: "6379"
      BACKEND_PORT: "8000"
      FRONTEND_PORT: "5173"
    steps:
      - uses: actions/checkout@v4

      - name: Build and validate stack
        run: |
          set -euo pipefail
          compose() {
            docker compose \
              --project-name "${COMPOSE_PROJECT_NAME}" \
              -f "${GITHUB_WORKSPACE}/infra/docker-compose.yml" \
              "$@"
          }
          cleanup() {
            status=$?
            trap - EXIT
            if (( status != 0 )); then
              compose ps -a || true
              compose logs --no-color postgres redis backend frontend || true
            fi
            compose down --volumes --remove-orphans || true
            exit "${status}"
          }
          trap cleanup EXIT

          compose build
          compose up -d --wait --wait-timeout 180

          for service in postgres redis backend frontend; do
            container_id="$(compose ps -q "${service}")"
            if [[ -z "${container_id}" ]]; then
              echo "${service} container is missing"
              exit 1
            fi
            health="$(
              docker inspect \
                --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' \
                "${container_id}"
            )"
            if [[ "${health}" != "healthy" ]]; then
              echo "${service} is not healthy: ${health}"
              exit 1
            fi
          done

          compose ps
          curl --fail --show-error --silent \
            "http://127.0.0.1:${BACKEND_PORT}/api/v1/health" >/dev/null
          curl --fail --show-error --silent \
            "http://127.0.0.1:${FRONTEND_PORT}/health" >/dev/null
